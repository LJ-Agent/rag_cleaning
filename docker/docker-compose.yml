version: "3.8"

services:
  rag-cleaning:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: rag-cleaning
    ports:
      - "50056:50056"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.openai.com/v1}
      - LLM_CHAT_MODEL=${LLM_CHAT_MODEL:-gpt-4o}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - LOGGING_LEVEL=INFO
    networks:
      - rag-network
    depends_on:
      - kafka
      - minio
      - redis
    restart: unless-stopped

  # Lightweight local dev dependencies (use parent docker-compose for production)
  kafka:
    image: bitnami/kafka:3.6
    container_name: rag-cleaning-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@localhost:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
    networks:
      - rag-network

  minio:
    image: minio/minio:latest
    container_name: rag-cleaning-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    networks:
      - rag-network

  redis:
    image: redis:7-alpine
    container_name: rag-cleaning-redis
    ports:
      - "6379:6379"
    networks:
      - rag-network

networks:
  rag-network:
    name: rag-network
    external: true
